# --- Prefix ---
# Change prefix from C-b to C-s (C-b conflicts with Emacs backward-char)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# --- Panes ---
# Split: prefix + | (vertical), prefix + - (horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes: prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Equalize pane sizes without rearranging: prefix + =
bind = select-layout -E

# --- Windows ---
# New window keeps current directory
bind c new-window -c "#{pane_current_path}"

# Move window left/right: prefix + < / >
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window

# Start window numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1

# --- General ---
# Enable mouse (scroll, click to select pane, resize)
set -g mouse on

# More scrollback
set -g history-limit 10000

# Reduce escape delay (important for Emacs)
set -sg escape-time 10

# Show pane numbers longer (prefix + q, then press number)
set -g display-panes-time 5000

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Pane styling ---
# Dim inactive panes, normal background for active
set -g window-style 'bg=colour237'
set -g window-active-style 'bg=colour0'

# --- Status bar ---
# Clean, minimal status bar
set -g status-style "bg=colour238,fg=white"
set -g status-left "[#S] "
set -g status-right ""
setw -g window-status-current-format "#{?window_zoomed_flag,🔍 ,}#I:#W"
setw -g window-status-current-style "#{?window_zoomed_flag,fg=yellow bold,fg=green bold}"
setw -g window-status-style "fg=grey"
